<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <!-- Axeptio — doit être le premier script du head -->
  <script src="/js/axeptio-init.js?v=__V_AXEPTIO_JS__"></script>
  <script src="/js/scroll-init.js?v=__V_SCROLL_INIT_JS__"></script>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <meta name="theme-color" content="#1a1a2e">
  <link rel="preconnect" href="https://static.axept.io" crossorigin>
  <link rel="preload" href="/assets/fonts/raleway-latin.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="/css/style.css?v=__V_STYLE_CSS__">
  <link rel="stylesheet" href="/css/nav.css?v=__V_NAV_CSS__">
  <title>Page introuvable — Gacem Avocat</title>
  <meta name="description" content="La page que vous recherchez n'existe pas ou a été déplacée.">
  <meta name="robots" content="noindex, follow">
  <style>
    .error-page {
      min-height: 60vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 80px 64px;
      background: var(--gris-clair, #fafaf8);
      text-align: center;
    }
    .error-page-inner { max-width: 520px; }
    .error-code {
      font-size: clamp(72px, 12vw, 120px);
      font-weight: 200;
      color: var(--bleu-nuit, #1a1a2e);
      letter-spacing: 0.08em;
      line-height: 1;
      margin-bottom: 24px;
      opacity: 0.12;
    }
    .error-page h1 {
      font-size: clamp(22px, 3vw, 32px);
      font-weight: 300;
      color: var(--bleu-nuit, #1a1a2e);
      letter-spacing: 0.04em;
      margin-bottom: 16px;
    }
    .error-page p {
      font-size: 15px;
      font-weight: 400;
      color: var(--gris-ardoise, #4a5568);
      line-height: 1.85;
      margin-bottom: 40px;
    }
    .error-cta {
      display: inline-block;
      padding: 14px 36px;
      background: var(--bleu-ardoise, #2d3f5c);
      color: var(--blanc, #ffffff);
      border-radius: 980px;
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-weight: 500;
      text-decoration: none;
      transition: background 0.25s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .error-cta:hover {
      background: var(--bleu-nuit, #1a1a2e);
    }
    @media (max-width: 600px) {
      .error-page { padding: 60px 20px; }
    }
  </style>
</head>
<body>

<!-- @partial header -->
<!-- /@partial -->

<main id="main" tabindex="-1">
  <div class="error-page">
    <div class="error-page-inner">
      <div class="error-code">404</div>
      <h1>Page introuvable</h1>
      <p>La page que vous recherchez n'existe pas ou a été déplacée.</p>
      <a href="/" class="error-cta">Retour à l'accueil</a>
    </div>
  </div>
</main>

<!-- @partial contact-section -->
<!-- /@partial -->

<!-- @partial footer -->
<!-- /@partial -->

<script src="/js/nav.js?v=__V_NAV_JS__"></script>
<script src="/js/scroll-reveal.js?v=__V_SCROLL_REVEAL_JS__"></script>
<script src="/js/page-transition.js?v=__V_PAGE_TRANSITION_JS__"></script>

</body>
</html>
