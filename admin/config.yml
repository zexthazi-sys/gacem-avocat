backend:
  name: github
  repo: zexthazi-sys/gacem-avocat
  branch: main
  auth_type: pkce
  # Remplacez par le Client ID de votre GitHub OAuth App (voir GUIDE_ADMIN.md)
  app_id: REMPLACER_PAR_VOTRE_CLIENT_ID

locale: 'fr'
site_url: https://gacem-avocat.com
display_url: https://gacem-avocat.com

# Dossier pour les médias uploadés via l'interface
media_folder: "assets/uploads"
public_folder: "/assets/uploads"

# Désactiver le workflow éditorial (publication directe)
publish_mode: simple

collections:
  - name: "posts"
    label: "Articles de blog"
    label_singular: "Article"
    folder: "posts"
    create: true
    delete: true
    slug: "{{slug}}"
    preview_path: "/blog/{{slug}}.html"
    summary: "{{title}} — {{date}}"
    sortable_fields: ["date", "title", "category"]
    fields:
      - label: "Titre"
        name: "title"
        widget: "string"
        hint: "Titre complet de l'article (affiché en page et dans Google)"

      - label: "Date de publication"
        name: "date"
        widget: "datetime"
        date_format: "YYYY-MM-DD"
        time_format: false
        format: "YYYY-MM-DD"

      - label: "Catégorie"
        name: "category"
        widget: "select"
        options:
          - "Urbanisme"
          - "Marchés publics"
          - "Droit administratif"
          - "Droit public"
          - "Contentieux"

      - label: "Meta description (SEO)"
        name: "description"
        widget: "text"
        hint: "150–160 caractères max. Affiché dans les résultats Google."

      - label: "Extrait"
        name: "excerpt"
        widget: "text"
        hint: "2–3 phrases résumant l'article. Affiché sur la page blog."

      - label: "Corps de l'article"
        name: "body"
        widget: "markdown"
        hint: "Rédigez votre article ici. Utilisez les boutons de la barre d'outils pour formater."
